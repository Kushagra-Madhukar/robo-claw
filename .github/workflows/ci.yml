name: Rust CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Workspace Validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install dependencies
      run: |
        # Install libextism if needed by the runner
        curl -O https://raw.githubusercontent.com/extism/extism/main/install.sh
        sudo sh install.sh /usr/local
        
    - name: Check Formatting
      run: cargo fmt --all -- --check
      
    - name: Build
      run: cargo build --workspace --verbose
      
    - name: Run Workspace Tests
      run: cargo test --workspace --verbose

    - name: Acceptance Gates
      run: scripts/check-acceptance-gates.sh

    - name: Architecture Stress Suite
      run: scripts/run-stress-suite.sh
      
    - name: Clippy
      run: cargo clippy --workspace -- -D warnings
      
    - name: Dry-run Publish Validation
      run: |
        # Validate that all crates are publish-ready (metadata and dependencies)
        for crate in aria-core aria-gateway aria-intelligence aria-mesh aria-policy aria-safety aria-skill-runtime aria-ssmu aria-vault aria-x; do
          if [ -d "$crate" ]; then
            echo "Validating $crate..."
            cargo publish --dry-run --package "$crate" --allow-dirty --no-verify || echo "$crate is not ready for publish"
          fi
        done
