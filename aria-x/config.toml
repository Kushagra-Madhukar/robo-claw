# ARIA-X Orchestrator Configuration

[vault]
storage_path = "./vault.json"

[llm]
# Backend type: "mock", "ollama", "openai", "anthropic", "gemini", "openrouter"
backend = "gemini"
# Model name (provider-specific). Default is Gemini 3 Flash.
model = "gemini-3-flash-preview"
# Max tool rounds per request
max_tool_rounds = 5

[policy]
# Path to the Cedar policy file
policy_path = "./aria-policy/policies/default.cedar"
whitelist = ["/workspace/", "./"]
forbid = ["/etc/", "/usr/", "/var/"]

[gateway]
# Adapter type: "cli", "telegram", "websocket"
adapter = "telegram"
# Optional multi-adapter list; when present this overrides `adapter`.
# adapters = ["cli", "telegram"]
# Onboarding CLI examples:
# cargo run -p aria-x -- channels list
# cargo run -p aria-x -- channels add websocket
# Optional explicit cross-channel fanout:
# [[gateway.fanout]]
# source = "telegram"
# destination = "websocket"
# enabled = true
# Session scope policy:
# main | peer | channel_peer | account_channel_peer
session_scope_policy = "main"
# Use TELEGRAM_BOT_TOKEN env or gateway.telegram_token_file for secrets.
# STT mode: auto | local | cloud | off
stt_mode = "auto"
# For local Whisper STT, set:
# WHISPER_CPP_MODEL=/absolute/path/to/model.bin
# WHISPER_CPP_BIN=whisper-cli
# FFMPEG_BIN=ffmpeg
# Optional: WHISPER_CPP_LANGUAGE=en
telegram_port = 8080
# "polling" mode works anywhere without ngrok/public IP
telegram_mode = "polling"
stt_backend = "local_whisper"
stt_cloud_fallback = false
# stt_cloud_endpoint = "https://your-stt-provider.example/v1/transcribe"
# WebSocket gateway bind/port (used when websocket adapter is enabled).
websocket_bind_address = "127.0.0.1"
websocket_port = 8090
# WhatsApp gateway bind/port and outbound provider integration.
whatsapp_bind_address = "127.0.0.1"
whatsapp_port = 8091
# whatsapp_outbound_url = "https://provider.example/messages"
# whatsapp_auth_token = ""

[agents_dir]
path = "./agents"

[router]
# Minimum cosine score required for direct semantic dispatch.
confidence_threshold = 0.70
# If top-2 candidates differ by less than this, treat as tie.
tie_break_gap = 0.05

[ssmu]
# Directory for durable per-session memory files.
sessions_dir = "./workspace/sessions"
# Max retained rows for signed-skill signature audit records (0 disables pruning).
operator_skill_signature_max_rows = 5000
# Max retained rows for shell execution audit records (0 disables pruning).
operator_shell_exec_audit_max_rows = 20000

[scheduler]
# Enable scheduled prompt emission at runtime.
enabled = true
# Loop tick granularity in seconds.
tick_seconds = 1

[node]
id = "orchestrator-1"
role = "orchestrator"
tier = "orchestrator"

[cluster]
profile = "node"
runtime_store_backend = "sqlite"
tenant_id = "default"
workspace_scope = "default"
scheduler_shards = 1

[rollout]
canary_enabled = false
allowed_node_ids = []
enabled_features = []

[localization]
# Fallback timezone for users not listed below.
default_timezone = "Asia/Kolkata"
# Per-user timezone overrides (keyed by user_id/chat user id).
user_timezones = {}

[simulator]
# Enable simulator mode for robotics/HAL validation.
enabled = false
# Backend: "gazebo", "mujoco", or "none"
backend = "none"

# Example:
# [[scheduler.jobs]]
# id = "daily-standup"
# agent_id = "productivity"
# prompt = "Generate my standup from yesterday's commits."
# schedule = "daily@09:00#Asia/Kolkata"
