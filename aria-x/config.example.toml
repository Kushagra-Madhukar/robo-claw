## HiveClaw Example Configuration (full schema)

[llm]
backend = "gemini"
model = "gemini-3-flash-preview"
max_tool_rounds = 5

[policy]
policy_path = "../aria-policy/policies/default.cedar"

[gateway]
adapter = "cli" # or "telegram" or "websocket"
# Optional multi-adapter mode (preferred): when set, this list is used instead of `adapter`.
# Example: adapters = ["cli", "telegram"]
# adapters = ["cli"]
# Onboarding CLI:
#   cargo run -p aria-x --bin hiveclaw -- channels list
#   cargo run -p aria-x --bin hiveclaw -- channels add websocket
#   cargo run -p aria-x --bin hiveclaw -- channels status
#   cargo run -p aria-x --bin hiveclaw -- channels remove websocket
# Optional explicit cross-channel fanout:
# [[gateway.fanout]]
# source = "telegram"
# destination = "websocket"
# enabled = true
# Session scope policy:
# main = keep provider-native session ids
# peer = share one session per user across channels
# channel_peer = share per user within a channel
# account_channel_peer = isolate by original provider session/chat + channel + user
# session_scope_policy = "main"
# For adapter=telegram (resolution order: config → env → file):
# telegram_token = ""           # Inline token, or...
# telegram_token_file = ""      # Path to file (e.g. /run/secrets/telegram_token)
# telegram_port = 8080          # Webhook listen port (only if telegram_mode = webhook)
# telegram_mode = "polling"     # polling = no webhook (default). webhook = needs public URL
# Env: TELEGRAM_BOT_TOKEN. Also load from .env or ~/.hiveclaw/.env
# stt_mode = "auto"             # auto | local | cloud | off
# stt_backend = "local_whisper" # legacy backend selector for provider wiring
# Local Whisper requirements:
# WHISPER_CPP_MODEL=/absolute/path/to/model.bin
# WHISPER_CPP_BIN=whisper-cli
# FFMPEG_BIN=ffmpeg
# Optional language hint:
# WHISPER_CPP_LANGUAGE=en
# stt_cloud_fallback = false    # if true, fallback to cloud STT on local failure
# stt_cloud_endpoint = ""       # required for cloud_http or fallback (JSON API)
# stt_cloud_api_key_env = "OPENAI_API_KEY"
# websocket_bind_address = "127.0.0.1" # WebSocket server bind address
# websocket_port = 8090                # WebSocket server port
# whatsapp_bind_address = "127.0.0.1"  # WhatsApp webhook bind address
# whatsapp_port = 8091                 # WhatsApp webhook port
# whatsapp_outbound_url = ""           # Optional outbound provider endpoint
# whatsapp_auth_token = ""             # Optional bearer token for outbound API

[mesh]
mode = "peer"              # "peer" or "client"
endpoints = []             # e.g. ["tcp/localhost:7447"]

[agents_dir]
path = "../agents"

[router]
confidence_threshold = 0.70
tie_break_gap = 0.05

[ssmu]
sessions_dir = "../workspace/sessions"
# Operator-data retention limits (0 disables pruning for that table).
operator_skill_signature_max_rows = 5000
operator_shell_exec_audit_max_rows = 20000

[scheduler]
enabled = false
tick_seconds = 1

#[[scheduler.jobs]]
#id = "daily-standup"
#agent_id = "productivity"
#prompt = "Generate my standup from yesterday's commits."
#schedule = "daily@09:00#Asia/Kolkata"

[localization]
# Fallback timezone for users not listed below. Must be an IANA timezone.
default_timezone = "UTC"
# Optional per-user timezone overrides (keyed by user_id/chat user id).
# user_timezones = { "7890386204" = "Asia/Kolkata", "123456789" = "Europe/Zurich" }
user_timezones = {}

[node]
id = "orchestrator-1"
role = "orchestrator"      # "orchestrator" | "combined" | "ingress" | "outbound" | "scheduler"
tier = "orchestrator"

[cluster]
# edge | node | cluster
profile = "node"
# sqlite stays the default even for low-end devices. postgres is optional for cluster installs.
runtime_store_backend = "sqlite"
# postgres_url = "postgres://aria:secret@localhost/aria"
tenant_id = "default"
workspace_scope = "default"
scheduler_shards = 1

[rollout]
canary_enabled = false
allowed_node_ids = []
enabled_features = []

[simulator]
enabled = false
backend = "none"           # "gazebo" | "mujoco" | "none"

[telemetry]
# enabled=true, log_level=debug for all logs. Or RUST_LOG=aria_x=debug
enabled = false
log_level = "info"

[telemetry.exporters]
enabled = true
output_dir = "../workspace/telemetry"
write_json_bundle = true
write_jsonl = true

[telemetry.redaction]
redact_secret_like_values = true
redact_provider_payloads_in_shared_export = true
redact_user_content_in_shared_export = true

[ui]
enabled = false
bind_addr = "127.0.0.1:8080"
default_agent = "developer"
