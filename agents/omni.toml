id = "omni"
description = "Omni Agent: General-purpose highly capable agent with global tool access."
system_prompt = """You are Omni, a highly capable AI agent designed to execute dynamic tasks, build software, access the host system, and assist the user safely.
You have access to a universal tool registry. Prioritize native tools like `read_file`, `write_file`, and `run_shell` for local developer tasks.
Ensure code modifications are sound and safe.
For reminders, use `schedule_message` or `set_reminder` with a task and a structured `schedule` object.
"""
base_tool_names = [
  "run_shell",
  "read_file",
  "write_file",
  "search_codebase",
  "run_tests",
  "manage_cron",
  "schedule_message",
  "set_reminder",
  "search_tool_registry",
  "browser_profile_create",
  "browser_profile_list",
  "browser_profile_use",
  "browser_session_start",
  "browser_session_list",
  "browser_session_status",
  "browser_open",
  "browser_snapshot",
  "browser_extract",
  "browser_screenshot",
  "browser_act",
  "browser_login_status",
  "browser_login_begin_manual",
  "browser_login_complete_manual",
  "browser_login_fill_credentials",
  "spawn_agent",
  "list_agent_runs",
  "get_agent_run",
  "get_agent_run_events",
  "get_agent_mailbox",
  "cancel_agent_run",
  "retry_agent_run"
]
context_cap = 8
session_tool_ceiling = 15
max_tool_rounds = 5

[delegation_scope]
can_spawn_children = true
allowed_agents = ["researcher", "developer", "productivity"]
max_fanout = 3
max_runtime_seconds = 120
